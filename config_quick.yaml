# ============================================================
# Quick smoke-test — verify setup with smallest model, 1 run
# ============================================================
#
# Usage:
#   cd sLLM_eval_framework
#   python runner.py --config config_quick.yaml --verbose

models:
  # ---------- Ministral-3 families ----------
  - type: ollama
    model: ministral-3:3b
    kwargs:
      temperature: 0.5
      num_predict: 2048

  - type: ollama
    model: ministral-3:8b
    kwargs:
      temperature: 0.5
      num_predict: 2048

  - type: ollama
    model: ministral-3:14b
    kwargs:
      temperature: 0.5
      num_predict: 2048


skills_dir: ./skills

skill_configs:
  - name: all_skills
    enabled: []
  - name: no_skills
    enabled: null

benchmarks:
  - type: skill_selection_accuracy
    kwargs:
      temperature: 0.5
  - type: end_to_end_task_completion
    kwargs:
      max_turns: 2
      temperature: 0.5

runs: 1
concurrency: 1
output_dir: ./results
